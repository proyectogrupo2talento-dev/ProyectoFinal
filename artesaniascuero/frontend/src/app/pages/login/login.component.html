<div class="login-page">
  <div class="login-card">
    <h1>Artesanías en Cuero</h1>
    <p class="subtitle">Sistema de gestión</p>
    <form (ngSubmit)="login()">
      <div *ngIf="mensajeError" class="mensaje-error">
        {{ mensajeError }}
      </div>
      <label>Usuario</label>
      <input 
        type="text"
        [(ngModel)]="username"
        name="username"
        placeholder="Ingrese su usuario"
        [disabled]="loading"
        required
      >
      <label>Contraseña</label>
      <input
        type="password"
        [(ngModel)]="password"
        name="password"
        placeholder="Ingrese su contraseña"
        [disabled]="loading"
        required
      >
      <button type="submit" [disabled]="loading">
        {{ loading ? 'Ingresando...' : 'Iniciar sesión' }}
      </button>
    </form>
  </div>
</div>
